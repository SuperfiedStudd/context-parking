<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Parking</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Context Parking</h1>

    <div class="settings">
      <label for="url">Supabase URL</label>
      <input type="text" id="url" placeholder="https://xxx.supabase.co" />

      <label for="provider">AI Provider</label>
      <select id="provider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="google">Google (Gemini)</option>
      </select>

      <label for="apikey">AI API Key</label>
      <input type="password" id="apikey" placeholder="Your provider API key" />

      <button id="save" class="btn-secondary">Save Settings</button>
    </div>

    <hr />

    <button id="capture" class="btn-primary">Capture This Chat</button>

    <div id="status" class="status idle">Ready</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
