<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Parking</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Context Parking</h1>

    <div id="config-status" class="config-status"></div>

    <button id="capture" class="btn-primary">Capture This Chat</button>

    <div id="status" class="status idle">Ready</div>
  </div>

  <!-- Capture Options Modal -->
  <div id="capture-modal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h2>Capture Options</h2>

      <fieldset class="field-group">
        <legend>Capture Type</legend>
        <label class="radio-option">
          <input type="radio" name="captureType" value="planning" checked />
          <span>Planning / Brainstorm</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="captureType" value="decision" />
          <span>Decision / Final Direction</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="captureType" value="draft" />
          <span>Message Draft</span>
        </label>
      </fieldset>

      <div class="field-group">
        <label for="focusField" class="field-label">Optional focus or instruction</label>
        <textarea
          id="focusField"
          class="focus-textarea"
          maxlength="300"
          placeholder="e.g. &quot;Emphasize risks.&quot; &quot;Extract only the final draft.&quot;"
          rows="3"
        ></textarea>
        <div class="char-count"><span id="charCount">0</span> / 300</div>
      </div>

      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-primary">Capture</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
